frr version 8.4_git
frr defaults traditional
hostname edge2
domainname localdomain
log syslog informational
no ip forwarding
ipv6 forwarding
!
! Address plan (ULA fd00::/48, RFC 4193):
!   lo   fd00::3/128        OSPFv3 area 0 passive
!   eth0 fd00:23::1/127     edge2–core P2P (/127 per RFC 6164)
!
! Static null route — advertised via BGP to simulate a downstream lab network
! Replaces the former 192.168.99.0/24 stub
ipv6 route fd00:dead:beef::/48 Null0
!
interface lo
 ipv6 address fd00::3/128
 ipv6 ospf6 passive
exit
!
interface eth0
 ipv6 address fd00:23::1/127
 ipv6 ospf6 network point-to-point
exit
!
router bgp 65000
 bgp router-id 3.3.3.3
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! iBGP to core route-reflector
 neighbor fd00::2 remote-as 65000
 neighbor fd00::2 update-source lo
 neighbor fd00::2 description core-rr
 !
 address-family ipv6 unicast
  network fd00::3/128
  network fd00:dead:beef::/48
  neighbor fd00::2 activate
  neighbor fd00::2 next-hop-self
 exit-address-family
exit
!
router ospf6
 ospf6 router-id 3.3.3.3
 interface lo area 0.0.0.0
 interface eth0 area 0.0.0.0
exit
!
end
