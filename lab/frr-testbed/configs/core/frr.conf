frr version 8.4_git
frr defaults traditional
hostname core
domainname localdomain
log syslog informational
no ip forwarding
ipv6 forwarding
!
! Address plan (ULA fd00::/48, RFC 4193):
!   lo   fd00::2/128        OSPFv3 area 0 passive — route-reflector router-id
!   eth0 fd00:12::1/127     core–edge1 P2P (/127 per RFC 6164)
!   eth1 fd00:23::0/127     core–edge2 P2P (/127 per RFC 6164)
!
interface lo
 ipv6 address fd00::2/128
 ipv6 ospf6 passive
exit
!
interface eth0
 ipv6 address fd00:12::1/127
 ipv6 ospf6 network point-to-point
exit
!
interface eth1
 ipv6 address fd00:23::0/127
 ipv6 ospf6 network point-to-point
exit
!
router bgp 65000
 bgp router-id 2.2.2.2
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 !
 ! iBGP route-reflector clients
 neighbor fd00::1 remote-as 65000
 neighbor fd00::1 update-source lo
 neighbor fd00::1 description edge1-client
 neighbor fd00::3 remote-as 65000
 neighbor fd00::3 update-source lo
 neighbor fd00::3 description edge2-client
 !
 address-family ipv6 unicast
  neighbor fd00::1 activate
  neighbor fd00::1 route-reflector-client
  neighbor fd00::3 activate
  neighbor fd00::3 route-reflector-client
 exit-address-family
exit
!
router ospf6
 ospf6 router-id 2.2.2.2
 interface lo area 0.0.0.0
 interface eth0 area 0.0.0.0
 interface eth1 area 0.0.0.0
exit
!
end
